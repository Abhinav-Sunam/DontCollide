<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DontCollide</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111827;
            overflow: hidden;
        }

        body {
            display: grid;
            place-items: center;
        }

        #game-wrap {
            position: relative;
            width: min(100vw, calc(100vh * 1.54));
            max-height: 100vh;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 100vh;
            background: #0f172a;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        #hint {
            position: absolute;
            left: 12px;
            bottom: 12px;
            margin: 0;
            padding: 8px 10px;
            border-radius: 6px;
            color: #dbeafe;
            background: rgba(15, 23, 42, 0.75);
            font: 12px/1.4 "Trebuchet MS", "Segoe UI", sans-serif;
        }

        #music-controls {
            position: absolute;
            right: 12px;
            bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 9px;
            border: 1px solid rgba(191, 219, 254, 0.5);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.82);
            color: #e2e8f0;
            font: 12px/1 "Trebuchet MS", "Segoe UI", sans-serif;
            z-index: 2;
            user-select: none;
        }

        #music-status {
            display: inline-block;
            min-width: 104px;
            text-align: center;
        }

        #music-controls button {
            border: 1px solid rgba(191, 219, 254, 0.45);
            border-radius: 6px;
            padding: 4px 8px;
            background: rgba(30, 41, 59, 0.9);
            color: #e2e8f0;
            font: 12px/1 "Trebuchet MS", "Segoe UI", sans-serif;
            cursor: pointer;
        }

        #music-controls button:hover {
            background: rgba(51, 65, 85, 0.95);
        }
    </style>
</head>
<body>
    <div id="game-wrap">
        <canvas id="game-canvas" width="1512" height="982"></canvas>
        <div id="music-controls" role="group" aria-label="Music controls">
            <span id="music-status">Music: --</span>
            <button id="music-down" type="button" aria-label="Decrease music volume">Vol -</button>
            <button id="music-up" type="button" aria-label="Increase music volume">Vol +</button>
            <button id="music-toggle" type="button">Pause</button>
            <button id="music-stop" type="button">Stop</button>
        </div>
        <p id="hint">P1: WASD | P2: Arrow keys | Fullscreen: F | Restart: R</p>
    </div>
    <script src="./game.js"></script>
</body>
</html>
